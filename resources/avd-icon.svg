<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Monitor -->
  <rect x="2" y="3" width="20" height="13" rx="2" ry="2"/>
  <line x1="8" y1="20" x2="16" y2="20"/>
  <line x1="12" y1="16" x2="12" y2="20"/>
  <!-- Three session host dots (health indicators) -->
  <circle cx="7" cy="9" r="1.8" fill="currentColor"/>
  <circle cx="12" cy="9" r="1.8" fill="currentColor"/>
  <circle cx="17" cy="9" r="1.8" fill="currentColor"/>
  <!-- Person silhouettes above dots -->
  <circle cx="7" cy="6.5" r="0.8" fill="currentColor"/>
  <circle cx="12" cy="6.5" r="0.8" fill="currentColor"/>
  <circle cx="17" cy="6.5" r="0.8" fill="currentColor"/>
  <!-- Status bar line -->
  <line x1="5" y1="12" x2="19" y2="12" stroke-width="0.5"/>
  <!-- Mini bar chart -->
  <line x1="6" y1="14.5" x2="6" y2="13" stroke-width="1.2"/>
  <line x1="8.5" y1="14.5" x2="8.5" y2="12.5" stroke-width="1.2"/>
  <line x1="11" y1="14.5" x2="11" y2="13.5" stroke-width="1.2"/>
  <line x1="13.5" y1="14.5" x2="13.5" y2="12" stroke-width="1.2"/>
  <line x1="16" y1="14.5" x2="16" y2="13.2" stroke-width="1.2"/>
  <line x1="18.5" y1="14.5" x2="18.5" y2="14" stroke-width="1.2"/>
</svg>
